<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SQL Queries</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            vertical-align: top;
        }

        th {
            background-color: #f4f4f4;
        }

        pre {
            background-color: #f8f8f8;
            padding: 10px;
            border-radius: 6px;
            white-space: pre-wrap;
            overflow-x: auto;
            max-width: 600px;
        }

        .btn {
            display: inline-block;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 500;
            border-radius: 20px;
            text-decoration: none;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }

        .btn-edit {
            background-color: #4CAF50;
            color: white;
        }

        .btn-edit:hover {
            background-color: #43a047;
            transform: translateY(-1px);
        }

        .btn-delete {
            background-color: #f44336;
            color: white;
        }

        .btn-delete:hover {
            background-color: #e53935;
            transform: translateY(-1px);
        }

        .btn-add {
            background-color: #2196F3;
            color: white;
            padding: 8px 18px;
            border-radius: 25px;
        }

        .btn-add:hover {
            background-color: #1976d2;
            transform: translateY(-1px);
        }
        .btn-export {
            background-color: #4CAF50;
            color: white;
            padding: 8px 18px;
            border-radius: 25px;
            text-decoration: none;
            display: inline-block;
        }

        .btn-export:hover {
            background-color: #388e3c;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

<h1>SQL Queries</h1>

<div style="display:flex; gap:10px; margin-bottom:20px;">
    <a th:href="@{/queries/add}" class="btn btn-add">+ Add New Query</a>
    <a th:href="@{/queries/export}" class="btn btn-export">⬇ Export CSV</a>
</div>

<form method="get" action="/queries" style="margin:20px 0;">
    <input type="text" name="schema"
           placeholder="Search by schema name..."
           style="padding:8px; width:250px;">
    <button type="submit" class="btn btn-add">Search</button>
</form>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Question</th>
        <th>Schema</th>
        <th>Difficulty</th>
        <th>SQL Answer</th>
        <th>ChatGPT Valid</th>
        <th>Notes</th>
        <th>Schema DDL</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="q : ${queries}">
        <td th:text="${q.id}"></td>
        <td th:text="${q.question}"></td>
        <td th:text="${q.schemaName}"></td>
        <td th:text="${q.difficulty}"></td>
        <td>
            <pre><code th:text="${q.sqlAnswer}"></code></pre>
        </td>
        <td th:text="${q.chatgptValid}"></td>
        <td th:text="${q.notes}"></td>
        <td><pre th:if="${q.schemaDdl != null and !#strings.isEmpty(q.schemaDdl)}"><code th:text="${q.schemaDdl}"></code></pre></td>
        <td>
            <div style="display:flex; gap:8px;">
                <a th:href="@{/queries/edit/{id}(id=${q.id})}"
                   class="btn btn-edit">Edit</a>

                <form th:action="@{/queries/delete/{id}(id=${q.id})}" method="post">
                    <button type="submit" class="btn btn-delete">Delete</button>
                </form>
            </div>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
